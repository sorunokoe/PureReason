<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1a1a2e" stroke="#16213e" stroke-width="2"/>
  
  <!-- Outer ring (reasoning loop) -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#0f4c81" stroke-width="3" stroke-dasharray="10,5"/>
  
  <!-- Inner geometric symbol (determinism) -->
  <g transform="translate(100, 100)">
    <!-- Diamond (verification) -->
    <path d="M 0,-50 L 50,0 L 0,50 L -50,0 Z" fill="none" stroke="#4a9eff" stroke-width="4"/>
    
    <!-- Inner checkmark (assurance) -->
    <path d="M -25,0 L -10,15 L 25,-20" fill="none" stroke="#00ff88" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Center dot (pure reason core) -->
    <circle cx="0" cy="0" r="8" fill="#fff" opacity="0.9"/>
  </g>
  
  <!-- Performance enhancement indicator (small star top-right) -->
  <g transform="translate(160, 40)">
    <circle cx="0" cy="0" r="15" fill="#ffd700" opacity="0.2"/>
    <text x="0" y="6" text-anchor="middle" font-family="Arial" font-size="18" fill="#ffd700">⚡</text>
  </g>
  
  <!-- Performance indicators (bottom) -->
  <text x="100" y="185" text-anchor="middle" font-family="monospace" font-size="11" fill="#4a9eff" opacity="0.8">&lt;5ms · -40% · +30pp</text>
</svg>
