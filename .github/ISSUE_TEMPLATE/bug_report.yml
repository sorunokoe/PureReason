name: Bug Report
description: Something is not working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `pure-reason calibrate "..."`
        2. Or `from pureason import ...`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Paste error messages and output.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: PureReason version
      description: Output of `pure-reason --version` or `python3 -c "import pureason; print(pureason.__version__)"`
      placeholder: "0.2.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows
        - Other
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version (if applicable)
      placeholder: "3.11"

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context about the problem (logs, stack traces, etc.)
