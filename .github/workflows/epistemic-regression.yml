name: Epistemic Regression Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  epistemic-regression:
    name: Epistemic Regression Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build benchmark tool
        run: cargo build -p pure-reason-bench --release

      - name: Run epistemic regression suite
        # Gate restored (TRIZ-42 NE-8). --fail-on-error defaults to true in the
        # binary; the env var makes the intent explicit and unmaskable via args.
        env:
          PURE_REASON_BENCH_FAIL_ON_ERROR: "true"
        run: |
          ./target/release/pure-reason-bench run examples/epistemic-test-suite.json \
            --output epistemic-results.json

      - name: Upload regression results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: epistemic-regression-results
          path: epistemic-results.json

  benchmark:
    name: Benchmark Evaluation
    runs-on: ubuntu-latest
    needs: epistemic-regression
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build benchmark tool
        run: cargo build -p pure-reason-bench --release

      - name: Run benchmark suite
        run: |
          ./target/release/pure-reason-bench bench \
            --output benchmark-results.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.json
