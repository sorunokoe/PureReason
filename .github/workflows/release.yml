# PureReason Release Pipeline (TRIZ Report IX — S12)
#
# Triggered when a version tag (v*.*.*) is pushed.
#
# Jobs:
#   1. build-binaries — cross-compile CLI for macOS / Linux / Windows
#   2. build-wheels   — build PyPI wheels with maturin for all platforms
#   3. publish-crates — publish pure-reason-kb and pure-reason-core to crates.io
#   4. create-release — create a GitHub Release with all artifacts
#
# Required secrets:
#   CARGO_REGISTRY_TOKEN  — crates.io API token
#   PYPI_API_TOKEN        — PyPI API token (set to __token__ as username)

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

env:
  RUST_BACKTRACE: 1

jobs:
  # ── 1. Build CLI binaries ──────────────────────────────────────────────────
  build-binaries:
    name: Build CLI — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,     target: aarch64-apple-darwin,       ext: "" }
          - { os: macos-13,     target: x86_64-apple-darwin,        ext: "" }
          - { os: ubuntu-22.04, target: x86_64-unknown-linux-gnu,   ext: "" }
          - { os: ubuntu-22.04, target: aarch64-unknown-linux-gnu,  ext: "" }
          - { os: windows-2022, target: x86_64-pc-windows-msvc,     ext: ".exe" }

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure cross linker (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build release binary
        run: |
          cargo build -p pure-reason-cli --release --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          BIN=pure-reason${{ matrix.ext }}
          SRC=target/${{ matrix.target }}/release/$BIN
          DEST=pure-reason-${{ matrix.target }}${{ matrix.ext }}
          cp "$SRC" "$DEST"
          # Create checksum
          if command -v sha256sum &>/dev/null; then
            sha256sum "$DEST" > "${DEST}.sha256"
          elif command -v shasum &>/dev/null; then
            shasum -a 256 "$DEST" > "${DEST}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: |
            pure-reason-${{ matrix.target }}${{ matrix.ext }}
            pure-reason-${{ matrix.target }}${{ matrix.ext }}.sha256
          if-no-files-found: error

  # ── 2. Build PyPI wheels ───────────────────────────────────────────────────
  build-wheels:
    name: Wheel — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,     target: aarch64-apple-darwin }
          - { os: macos-13,     target: x86_64-apple-darwin }
          - { os: ubuntu-22.04, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-22.04, target: aarch64-unknown-linux-gnu }
          - { os: windows-2022, target: x86_64-pc-windows-msvc }

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install maturin
        run: pip install maturin

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: wheel-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build wheel (Linux via manylinux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          pip install maturin[patchelf]
          maturin build \
            --release \
            --manifest-path crates/pure-reason-py/Cargo.toml \
            --target ${{ matrix.target }} \
            --manylinux auto \
            --out dist/

      - name: Build wheel (macOS / Windows)
        if: "!startsWith(matrix.os, 'ubuntu')"
        run: |
          maturin build \
            --release \
            --manifest-path crates/pure-reason-py/Cargo.toml \
            --target ${{ matrix.target }} \
            --out dist/

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  # ── 3. Publish to crates.io ────────────────────────────────────────────────
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-22.04
    needs: [build-binaries, build-wheels]
    environment: release
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish pure-reason-kb
        run: cargo publish -p pure-reason-kb --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index propagation
        run: sleep 30

      - name: Publish pure-reason-core
        run: cargo publish -p pure-reason-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── 4. Publish to PyPI ─────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-22.04
    needs: [build-wheels]
    environment: release
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: Install twine
        run: pip install twine

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*.whl

  # ── 5. Create GitHub Release ───────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs: [build-binaries, build-wheels]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: release-assets/
          merge-multiple: true

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: release-assets/
          merge-multiple: true

      - name: Generate changelog excerpt
        id: changelog
        run: |
          TAG=${GITHUB_REF_NAME}
          echo "## PureReason ${TAG}" > changelog.md
          echo "" >> changelog.md
          echo "### What's Changed" >> changelog.md
          git log --oneline $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD \
            --pretty=format:"- %s" >> changelog.md || echo "- Initial release" >> changelog.md
          echo "" >> changelog.md
          echo "" >> changelog.md
          echo "### Installation" >> changelog.md
          echo "" >> changelog.md
          echo "\`\`\`bash" >> changelog.md
          echo "# Python" >> changelog.md
          echo "pip install pure-reason" >> changelog.md
          echo "" >> changelog.md
          echo "# Rust" >> changelog.md
          echo "cargo add pure-reason-core" >> changelog.md
          echo "\`\`\`" >> changelog.md
          cat changelog.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.md
          files: release-assets/**
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
